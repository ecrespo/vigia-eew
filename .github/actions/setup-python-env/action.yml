name: Setup Python env
description: Install uv (with cache) and sync the project with the requested extra.

inputs:
  extras:
    description: Optional-dependencies group to sync (e.g. "dev", "security").
    required: false
    default: dev

runs:
  using: composite
  steps:
    - uses: astral-sh/setup-uv@v3
      with:
        enable-cache: true
    - name: Sync project (${{ inputs.extras }})
      shell: bash
      run: uv sync --extra "${{ inputs.extras }}"
